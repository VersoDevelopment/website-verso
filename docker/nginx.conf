server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HTML altijd laten revalideren zodat clients nooit op een oude pagina blijven hangen
    add_header Cache-Control "no-cache" always;

    # Statische assets lang cachen (eigen add_header, erft server-headers niet, dat is prima voor assets)
    location ~* \.(?:mp4|webm|jpg|jpeg|png|webp|gif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000" always;
    }

    location /api/ {
        # Unieke containernaam i.p.v. generieke alias "api": web zit ook op npm_default
        # waar andere projecten (o.a. veramiek-api) dezelfde alias "api" registreren.
        proxy_pass http://versodevelopment-api-1:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
